<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="popup.css">
</head>

<body>

<h1>Focus Redirect</h1>
<h3>Modes</h3>

<label>
<input type="checkbox" id="focusToggle">
Focus Mode
</label>

<label>
<input type="checkbox" id="randomToggle">
Random Productive Redirect
</label>

<label>
<input type="checkbox" id="forceToggle">
Force Redirect Mode
</label>

<input id="forceURL" placeholder="Force redirect URL">

<label>
<input type="checkbox" id="punishToggle">
Punishment Mode
</label>

<button id="dashboard">Open Dashboard</button>
<div class="form">

<input id="block" placeholder="Site to block (reddit.com)">
<input id="redirect" placeholder="Redirect to (leetcode.com)">

<label>Start</label>
<input type="time" id="start">

<label>End</label>
<input type="time" id="end">

<button id="addRule">Add Rule</button>

</div>

<ul id="rulesList"></ul>

<script src="popup.js"></script>
</body>
</html>
