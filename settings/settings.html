<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Block2Redirect Settings</title>
	<link rel="stylesheet" href="settings.css">
</head>

<body class="settings-page">

<h1>Settings</h1>

<div class="settings-container">
	<!-- LEFT 50%: Site Management -->
	<div class="settings-left">
		<!-- Top-Left: Blocked Sites -->
		<div class="panel blocked-sites-panel">
			<h3>Blocked Sites</h3>
			<div class="row">
				<input id="blockedSiteInput" placeholder="reddit.com" aria-label="Blocked site domain">
				<button id="addBlockedBtn">Add</button>
			</div>
			<ul id="blockedSitesList" class="sites-grid"></ul>
		</div>

		<!-- Top-Right: Productive Sites -->
		<div class="panel productive-sites-panel">
			<h3>Productive Sites</h3>
			<div class="row">
				<input id="productiveSiteInput" placeholder="https://developer.mozilla.org" aria-label="Productive site URL">
				<button id="addProductiveBtn">Add</button>
			</div>
			<ul id="productiveSitesList" class="sites-grid"></ul>
		</div>

		<!-- Bottom: Site Mappings -->
		<div class="panel site-mappings-panel">
			<h3>Site Mappings</h3>
			<p class="status-text">Map blocked sites to specific productive sites</p>
			<ul id="mappingList" class="mappings-list"></ul>
		</div>
	</div>

	<!-- RIGHT 50%: Features & Stats -->
	<div class="settings-right">
		<!-- Stats -->
		<div class="panel stats-panel">
			<h3>Blocked Attempts</h3>
			<ul id="statsList" class="stats-list"></ul>
		</div>

		<!-- Mode Toggles -->
		<div class="panel modes-panel">
			<h3>Modes</h3>
			<label class="toggle-label">
				<input type="checkbox" id="focusToggle">
				<span class="toggle-slider"></span>
				<span>Focus Mode</span>
			</label>
			<label class="toggle-label">
				<input type="checkbox" id="randomToggle">
				<span class="toggle-slider"></span>
				<span>Random Productive</span>
			</label>
			<label class="toggle-label">
				<input type="checkbox" id="punishToggle">
				<span class="toggle-slider"></span>
				<span>Punishment Mode</span>
			</label>
			<label class="toggle-label">
				<input type="checkbox" id="timerToggle">
				<span class="toggle-slider"></span>
				<span>Timer Mode</span>
			</label>
		</div>

		<!-- Timer Settings -->
		<div class="panel timer-panel">
			<h3>Timer Sessions</h3>
			<div class="row">
				<input type="number" id="workMinutesInput" min="1" placeholder="Work min" aria-label="Work minutes">
				<input type="number" id="breakMinutesInput" min="1" placeholder="Break min" aria-label="Break minutes">
				<button id="saveSessionConfigBtn">Save</button>
			</div>
			<div class="row">
				<button id="startSessionBtn">Start</button>
				<button id="stopSessionBtn" class="danger">Stop</button>
			</div>
			<p id="sessionStatus" class="status-text">Session inactive</p>
		</div>

		<!-- Other Settings -->
		<div class="panel other-panel">
			<h3>Additional Settings</h3>
			<div class="row">
				<input type="number" id="punishThresholdInput" min="1" placeholder="Punishment threshold" aria-label="Punishment threshold">
				<button id="saveThresholdBtn">Save</button>
			</div>
			<div class="row">
				<label>Default Redirect:</label>
				<select id="defaultProductiveSelect" aria-label="Default productive site"></select>
				<button id="saveDefaultBtn">Set</button>
			</div>
		</div>
	</div>
</div>

<script src="settings.js"></script>

</body>
</html>
