<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block2Redirect Popup</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <!-- 
        POPUP MAIN INTERFACE
        
        This popup provides quick access to block the current site or add sites to the blocklist.
        
        Key Features:
        - Input field to manually enter a site to block
        - "Block Current Site" button to instantly block the active tab's site
        - "Add Blocked Site" button to add manually entered sites after validation
        - Status message area showing validation/success feedback
        - List of blocked sites with remove buttons
        - Settings gear icon to open the full settings page
        
        Site Validation:
        - Performs network reachability check (HTTP GET to validate site exists)
        - Normalizes domains (strips www, protocol, subpaths)
        - Rejects empty or malformed input
        - Automatically shortcuts current tab URL to bypass manual entry
        
        Current-Tab Blocking:
        - Immediately redirects if the blocked site is the active tab
        - Uses favicon from the tab or falls back to Google Favicons API
    -->

    <h1>Block2Redirect</h1>

    <h3>Block Site</h3>

    <div class="form">
        <input id="blockedSite" placeholder="Site to block (reddit.com)" aria-label="Blocked site domain">
        <div class="button-row">
            <button id="addBlockedSite" type="button">Add Blocked Site</button>
            <button id="blockCurrentSite" type="button" class="secondary">Block Current Site</button>
        </div>
    </div>

    <div id="statusMessage" class="status-text" aria-live="polite"></div>

    <ul id="blockedSitesList"></ul>

    <button id="settingsButton" class="settings-button" aria-label="Settings" title="Settings">⚙️</button>

    <script src="popup.js"></script>

</body>
</html>
