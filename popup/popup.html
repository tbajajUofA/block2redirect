<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block2Redirect Popup</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <h1>Block2Redirect</h1>

    <h3>Block Site</h3>

    <div class="form">
        <input id="blockedSite" placeholder="Site to block (reddit.com)" aria-label="Blocked site domain">
        <div class="button-row">
            <button id="addBlockedSite" type="button">Add Blocked Site</button>
            <button id="blockCurrentSite" type="button" class="secondary">Block Current Site</button>
        </div>
    </div>

    <div id="statusMessage" class="status-text" aria-live="polite"></div>

    <ul id="blockedSitesList"></ul>

    <button id="dashboard">Open Dashboard</button>

    <script src="popup.js"></script>

</body>
</html>
