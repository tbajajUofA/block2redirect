<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block2Redirect Popup</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <h1>Block2Redirect</h1>

    <h3>Quick Modes</h3>

    <label class="toggle-row">
        <input type="checkbox" id="focusToggle">
        Focus Mode
    </label>

    <label class="toggle-row">
        <input type="checkbox" id="randomToggle">
        Random Productive Redirect
    </label>

    <label class="toggle-row">
        <input type="checkbox" id="punishToggle">
        Punishment Mode
    </label>

    <label class="toggle-row">
        <input type="checkbox" id="timerToggle">
        Timer Session Mode
    </label>

    <h3>Quick Block Site</h3>

    <div class="form">
        <input id="blockedSite" placeholder="Site to block (reddit.com)" aria-label="Blocked site domain">
        <button id="addBlockedSite">Add Blocked Site</button>
    </div>

    <ul id="blockedSitesList"></ul>

    <button id="dashboard">Open Dashboard</button>

    <script src="popup.js"></script>

</body>
</html>
